name: CI/CD + Deploy EC2

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:

  build-and-push:
    runs-on: ubuntu-latest

    services:
      postgres-test:
        image: postgres:15
        env:
          POSTGRES_DB: gobierno_xxx
          POSTGRES_USER: aaee_gobierno
          POSTGRES_PASSWORD: aaee1234
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:

      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 23
          cache: maven

      - name: Compilar proyecto
        run: mvn clean package
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/gobierno_xxx
          SPRING_DATASOURCE_USERNAME: aaee_gobierno
          SPRING_DATASOURCE_PASSWORD: aaee1234

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:

      - name: Deploy en EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/app
            docker compose pull
            docker compose down
            docker compose up -d
